# GitHub Pages: build Vite app in chart-eval/ and deploy dist/
# Repo: https://github.com/SJTU-YONGFU-RESEARCH-GRP/website-trial-v1
#
# Site URL: https://sjtu-yongfu-research-grp.github.io/website-trial-v1/
#
# Setup (once): Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chart-eval
    steps:
      - uses: actions/checkout@v4

      # No npm cache: optional once chart-eval/package-lock.json is committed again:
      #   cache: npm
      #   cache-dependency-path: chart-eval/package-lock.json
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install and build
        run: |
          npm install
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: chart-eval/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
